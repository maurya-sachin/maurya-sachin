name: Update README

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "16"

      - name: Install Dependencies
        run: npm install axios

      - name: Update README Latest Repositories
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = './README.md';
            let readme = fs.readFileSync(path, 'utf-8');

            const { data: repos } = await github.rest.repos.listForUser({
              username: context.repo.owner,
              sort: 'updated',
              per_page: 5
            });

            const latestRepos = repos.map(repo => 
              `- [${repo.name}](${repo.html_url}): ${repo.description || ''}`
            ).join('\n');

            readme = readme.replace(/<!-- latest repos -->[\s\S]*?(?=---)/, `${latestRepos}\n\n`);
            fs.writeFileSync(path, readme);

      - name: Update Programming Quote
        run: |
          node -e '
          const fs = require("fs");
          const axios = require("axios");

          async function updateQuote() {
            let readme = fs.readFileSync("README.md", "utf8");
            
            try {
              const response = await axios.get("https://programming-quotes-api.herokuapp.com/Quotes/random");
              const quote = `> "${response.data.en}" - ${response.data.author}`;
              readme = readme.replace(/<!-- dynamic quotes -->[\s\S]*?(?=---)/, `${quote}\n\n`);
              fs.writeFileSync("README.md", readme);
            } catch (error) {
              console.error("Failed to fetch quote:", error);
              // Keep existing quote if fetch fails
            }
          }

          updateQuote().catch(console.error);
          '

      - name: Update Visitor Badge
        run: |
          sed -i 's|https://komarev.com/ghpvc/?username=maurya-sachin|https://visitor-badge.laobi.icu/badge?page_id=maurya-sachin.maurya-sachin|g' README.md

      - name: Commit changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md
          git commit -m "Update README with latest repos, quote, and visitor count" || exit 0
          git push
