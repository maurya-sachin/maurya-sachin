name: Update README

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Update README Latest Repositories
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const readme = fs.readFileSync('README.md', 'utf8');
            
            const response = await github.rest.repos.listForAuthenticatedUser({
              sort: 'updated',
              per_page: 5
            });
            
            const latestRepos = response.data
              .map(repo => `- [${repo.name}](${repo.html_url}): ${repo.description || ''}`)
              .join('\n');
            
            const newReadme = readme.replace(
              /<!-- latest repos -->[\s\S]*?(?=---)/,
              `<!-- latest repos -->\n${latestRepos}\n\n`
            );
            
            fs.writeFileSync('README.md', newReadme);

      - name: Update Programming Quote
        run: |
          node -e '
          const fs = require("fs");
          const axios = require("axios");
          
          async function updateQuote() {
            let readme = fs.readFileSync("README.md", "utf8");
            try {
              const response = await axios.get("https://programming-quotes-api.herokuapp.com/Quotes/random");
              const quote = `> "${response.data.en}" - ${response.data.author}`;
              readme = readme.replace(/<!-- dynamic quotes -->[\s\S]*?(?=---)/, `${quote}\n\n`);
              fs.writeFileSync("README.md", readme);
            } catch (error) {
              console.error("Failed to fetch quote:", error);
            }
          }
          
          updateQuote().catch(console.error);
          '

      - name: Commit changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md
          git commit -m "Update README with latest repos and quote" || exit 0
          git push
