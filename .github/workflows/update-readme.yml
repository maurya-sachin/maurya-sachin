name: Update README

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "16"

      - name: Install Dependencies
        run: npm install axios

      - name: Update README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node -e '
          const fs = require("fs");
          const axios = require("axios");

          async function updateReadme() {
            let readme = fs.readFileSync("README.md", "utf8");
            
            // Fetch latest repos
            const reposResponse = await axios.get(
              "https://api.github.com/users/maurya-sachin/repos?sort=updated&per_page=5",
              {
                headers: {
                  Authorization: `token ${process.env.GITHUB_TOKEN}`,
                }
              }
            );
            
            const reposList = reposResponse.data
              .map(repo => `- [${repo.name}](${repo.html_url}): ${repo.description || "No description"}`)
              .join("\n");
            
            // Fetch programming quote
            const quoteResponse = await axios.get("https://programming-quotes-api.herokuapp.com/Quotes/random");
            const quote = `> "${quoteResponse.data.en}" - ${quoteResponse.data.author}`;
            
            // Update readme content
            readme = readme.replace(/<!-- latest repos -->[\s\S]*?(?=---)/, `${reposList}\n\n`);
            readme = readme.replace(/<!-- dynamic quotes -->[\s\S]*?(?=---)/, `${quote}\n\n`);
            
            fs.writeFileSync("README.md", readme);
          }

          updateReadme().catch(console.error);
          '

      - name: Commit changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md
          git commit -m "Update README with latest repos and quote" || exit 0
          git push
