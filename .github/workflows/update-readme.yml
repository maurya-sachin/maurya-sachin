name: Update README

on:
  schedule:
    - cron: "0 0 * * *" # Runs daily at midnight UTC
  workflow_dispatch: # Allows manual runs

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Update README
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const path = './README.md';
            const readme = fs.readFileSync(path, 'utf-8');

            // Example: Add dynamic visitor count
            const updatedReadme = readme.replace(
              /<!-- visitor count -->/g,
              `![Visitor Count](https://komarev.com/ghpvc/?username=${process.env.GITHUB_REPOSITORY_OWNER}&color=blue)`
            );

            fs.writeFileSync(path, updatedReadme);

      - name: Commit Changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md
          git commit -m 'Update README dynamically'
          git push
